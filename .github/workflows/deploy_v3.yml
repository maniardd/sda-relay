name: SDA Deploy v3 (CLI/Netmiko)

# Auto-deploys sda_relay_server_v3.py on push to main when v3 files change.
# Requires a self-hosted runner labelled [self-hosted, sda-relay] on the VM.
# Manual trigger also available via Actions tab → Run workflow.

permissions:
  contents: write

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_curl_test:
        description: 'Action to run after deploy'
        required: false
        default: 'precheck-only'
        type: choice
        options:
          - 'precheck-only'
          - 'precheck-and-phase1'
          - 'phase-all'
          - 'no-test'

jobs:
  deploy:
    runs-on: [self-hosted, sda-relay]
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync repo to /opt/sda-relay and (re)start v3 relay
        id: deploy
        run: |
          set -e
          rsync -a --delete \
            --exclude='.git' --exclude='.github' --exclude='backups' \
            --exclude='.env' --exclude='ngrok.log' \
            --exclude='*.log' --exclude='venv' \
            "$GITHUB_WORKSPACE/" /opt/sda-relay/
          chmod +x /opt/sda-relay/scripts/*.sh
          bash /opt/sda-relay/scripts/deploy_v3.sh 2>&1 | tee /tmp/deploy_v3.log
          echo "---"
          echo "HEALTH:"
          curl -sS http://localhost:5000/health || true

      - name: Optional curl tests
        if: always()
        run: |
          set +e
          # Determine action: workflow_dispatch input wins; else read RUN_NEXT.txt; else default precheck-only
          ACTION=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ACTION="${{ github.event.inputs.run_curl_test }}"
          elif [ -f RUN_NEXT.txt ]; then
            ACTION="$(tr -d '[:space:]' < RUN_NEXT.txt)"
          else
            ACTION="precheck-only"
          fi
          echo "ACTION=$ACTION"
          [ "$ACTION" = "no-test" ] && exit 0

          echo "==> precheck"
          curl -sS --max-time 60 -X POST http://localhost:5000/api/v3/precheck | tee /tmp/precheck.json
          echo

          case "$ACTION" in
            phase1|precheck-and-phase1)
              echo "==> deploy/phase1-underlay"
              curl -sS --max-time 300 -X POST http://localhost:5000/api/v3/deploy/phase1-underlay \
                   -H 'Content-Type: application/json' -d '{}' | tee /tmp/phase1.json
              echo
              echo "==> verify/phase1-underlay"
              curl -sS --max-time 120 -X POST http://localhost:5000/api/v3/verify/phase1-underlay | tee /tmp/verify1.json
              ;;
            phase2)
              echo "==> deploy/phase2-lisp"
              curl -sS --max-time 300 -X POST http://localhost:5000/api/v3/deploy/phase2-lisp \
                   -H 'Content-Type: application/json' -d '{}' | tee /tmp/phase2.json
              echo
              echo "==> verify/phase2-lisp"
              curl -sS --max-time 120 -X POST http://localhost:5000/api/v3/verify/phase2-lisp | tee /tmp/verify2.json
              ;;
            phase3)
              curl -sS --max-time 300 -X POST http://localhost:5000/api/v3/deploy/phase3-overlay \
                   -H 'Content-Type: application/json' -d '{}' | tee /tmp/phase3.json
              ;;
            phase4)
              curl -sS --max-time 300 -X POST http://localhost:5000/api/v3/deploy/phase4-access \
                   -H 'Content-Type: application/json' -d '{}' | tee /tmp/phase4.json
              ;;
            phase5)
              curl -sS --max-time 300 -X POST http://localhost:5000/api/v3/deploy/phase5-internet \
                   -H 'Content-Type: application/json' -d '{}' | tee /tmp/phase5.json
              ;;
            rollback)
              echo "==> rollback to flash:pre-sda-backup-20260502.cfg on both switches"
              curl -sS --max-time 240 -X POST http://localhost:5000/api/v3/rollback \
                   -H 'Content-Type: application/json' -d '{"file":"pre-sda-backup-20260502.cfg"}' | tee /tmp/rollback.json
              ;;
            list-flash)
              curl -sS --max-time 60 http://localhost:5000/api/v3/list-flash | tee /tmp/list_flash.json
              ;;
            endpoint-map)
              curl -sS --max-time 30 http://localhost:5000/api/v3/endpoint-map | tee /tmp/endpoint_map.json
              ;;
            datapath)
              echo "==> deploy/phase4-access (re-push to apply DHCP-on-border move)"
              curl -sS --max-time 300 -X POST http://localhost:5000/api/v3/deploy/phase4-access \
                   -H 'Content-Type: application/json' -d '{}' | tee /tmp/phase4.json ; echo
              sleep 5
              echo "==> datapath-test"
              curl -sS --max-time 240 -X POST http://localhost:5000/api/v3/datapath-test | tee /tmp/datapath.json ; echo
              ;;
            phase-all)
              echo "==> deploy/phase1-underlay"
              curl -sS --max-time 300 -X POST http://localhost:5000/api/v3/deploy/phase1-underlay -H 'Content-Type: application/json' -d '{}' | tee /tmp/phase1.json ; echo
              sleep 3
              echo "==> verify/phase1-underlay"
              curl -sS --max-time 120 -X POST http://localhost:5000/api/v3/verify/phase1-underlay | tee /tmp/verify1.json ; echo
              echo "==> deploy/phase2-lisp"
              curl -sS --max-time 300 -X POST http://localhost:5000/api/v3/deploy/phase2-lisp -H 'Content-Type: application/json' -d '{}' | tee /tmp/phase2.json ; echo
              sleep 3
              echo "==> deploy/phase3-overlay"
              curl -sS --max-time 300 -X POST http://localhost:5000/api/v3/deploy/phase3-overlay -H 'Content-Type: application/json' -d '{}' | tee /tmp/phase3.json ; echo
              sleep 3
              echo "==> deploy/phase4-access"
              curl -sS --max-time 300 -X POST http://localhost:5000/api/v3/deploy/phase4-access -H 'Content-Type: application/json' -d '{}' | tee /tmp/phase4.json ; echo
              sleep 30
              echo "==> verify/phase2-lisp (after phase4 has injected EIDs)"
              curl -sS --max-time 120 -X POST http://localhost:5000/api/v3/verify/phase2-lisp -H 'Content-Type: application/json' -d '{"settle_seconds":5}' | tee /tmp/verify2.json ; echo
              echo "==> verify/phase4-access"
              curl -sS --max-time 120 -X POST http://localhost:5000/api/v3/verify/phase4-access -H 'Content-Type: application/json' -d '{"settle_seconds":5}' | tee /tmp/verify4.json ; echo
              echo "==> deploy/phase5-internet (no-op if mode=none)"
              curl -sS --max-time 300 -X POST http://localhost:5000/api/v3/deploy/phase5-internet -H 'Content-Type: application/json' -d '{}' | tee /tmp/phase5.json ; echo
              echo "==> show edge running-config (LISP+SVI sections)"
              curl -sS "http://localhost:5000/api/v3/show?target=edge&cmd=show+run+%7C+sec+router+lisp" | tee /tmp/show_lisp_edge.json ; echo
              curl -sS "http://localhost:5000/api/v3/show?target=border&cmd=show+run+%7C+sec+router+lisp" | tee /tmp/show_lisp_border.json ; echo
              echo "==> endpoint-map"
              curl -sS http://localhost:5000/api/v3/endpoint-map | tee /tmp/endpoint_map.json ; echo
              echo "==> datapath-test"
              curl -sS --max-time 240 -X POST http://localhost:5000/api/v3/datapath-test | tee /tmp/datapath.json ; echo
              ;;
            show-border-isis)
              curl -sS --max-time 60 "http://localhost:5000/api/v3/show?target=border&cmd=show+run+%7C+sec+router+isis" | tee /tmp/show.json
              ;;
            show-edge-isis)
              curl -sS --max-time 60 "http://localhost:5000/api/v3/show?target=edge&cmd=show+run+%7C+sec+router+isis" | tee /tmp/show.json
              ;;
            show-lisp)
              echo "==> BORDER: router lisp + lisp session + lisp site"
              curl -sS --max-time 60 "http://localhost:5000/api/v3/show?target=border&cmd=show+run+%7C+sec+router+lisp" | tee /tmp/show_lisp_border.json ; echo
              curl -sS --max-time 60 "http://localhost:5000/api/v3/show?target=border&cmd=show+lisp+session" | tee /tmp/show_lisp_session_border.json ; echo
              curl -sS --max-time 60 "http://localhost:5000/api/v3/show?target=border&cmd=show+lisp+instance-id+4099+ipv4+server" | tee /tmp/show_lisp_server_border.json ; echo
              echo "==> EDGE: router lisp + lisp session + cef + map-cache"
              curl -sS --max-time 60 "http://localhost:5000/api/v3/show?target=edge&cmd=show+run+%7C+sec+router+lisp" | tee /tmp/show_lisp_edge.json ; echo
              curl -sS --max-time 60 "http://localhost:5000/api/v3/show?target=edge&cmd=show+lisp+session" | tee /tmp/show_lisp_session_edge.json ; echo
              curl -sS --max-time 60 "http://localhost:5000/api/v3/show?target=edge&cmd=show+ip+cef+10.255.255.1" | tee /tmp/show_cef_edge.json ; echo
              ;;
            precheck-only|*)
              ;;
          esac
          true

      - name: Update LATEST_V3_RESULT.md
        if: always()
        run: |
          cd "$GITHUB_WORKSPACE"
          {
            echo "# Latest SDA v3 Deploy Result"
            echo
            echo "- Commit: \`${{ github.sha }}\`"
            echo "- Time: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "- Trigger: ${{ github.event_name }}"
            echo
            echo "## /health"
            echo '```json'
            curl -sS http://localhost:5000/health 2>/dev/null || echo "(unreachable)"
            echo
            echo '```'
            if [ -f /tmp/precheck.json ]; then
              echo "## /api/v3/precheck"
              echo '```json'
              cat /tmp/precheck.json
              echo
              echo '```'
            fi
            if [ -f /tmp/phase1.json ]; then
              echo "## /api/v3/deploy/phase1-underlay"
              echo '```json'
              cat /tmp/phase1.json
              echo
              echo '```'
            fi
            if [ -f /tmp/verify1.json ]; then
              echo "## /api/v3/verify/phase1-underlay"
              echo '```json'
              cat /tmp/verify1.json
              echo
              echo '```'
            fi
            if [ -f /tmp/phase2.json ]; then
              echo "## /api/v3/deploy/phase2-lisp"
              echo '```json'
              cat /tmp/phase2.json
              echo
              echo '```'
            fi
            if [ -f /tmp/verify2.json ]; then
              echo "## /api/v3/verify/phase2-lisp"
              echo '```json'
              cat /tmp/verify2.json
              echo
              echo '```'
            fi
            if [ -f /tmp/phase3.json ]; then
              echo "## /api/v3/deploy/phase3-overlay"
              echo '```json'
              cat /tmp/phase3.json
              echo
              echo '```'
            fi
            if [ -f /tmp/phase4.json ]; then
              echo "## /api/v3/deploy/phase4-access"
              echo '```json'
              cat /tmp/phase4.json
              echo
              echo '```'
            fi
            if [ -f /tmp/show.json ]; then
              echo "## /api/v3/show"
              echo '```json'
              cat /tmp/show.json
              echo
              echo '```'
            fi
            if [ -f /tmp/show_lisp_border.json ]; then
              echo "## show run | sec router lisp (BORDER)"
              echo '```json'
              cat /tmp/show_lisp_border.json
              echo
              echo '```'
            fi
            if [ -f /tmp/show_lisp_edge.json ]; then
              echo "## show run | sec router lisp (EDGE)"
              echo '```json'
              cat /tmp/show_lisp_edge.json
              echo
              echo '```'
            fi
            if [ -f /tmp/show_lisp_session_border.json ]; then
              echo "## show lisp session (BORDER)"
              echo '```json'
              cat /tmp/show_lisp_session_border.json
              echo
              echo '```'
            fi
            if [ -f /tmp/show_lisp_session_edge.json ]; then
              echo "## show lisp session (EDGE)"
              echo '```json'
              cat /tmp/show_lisp_session_edge.json
              echo
              echo '```'
            fi
            if [ -f /tmp/show_lisp_server_border.json ]; then
              echo "## show lisp instance-id 4099 ipv4 server (BORDER)"
              echo '```json'
              cat /tmp/show_lisp_server_border.json
              echo
              echo '```'
            fi
            if [ -f /tmp/show_cef_edge.json ]; then
              echo "## show ip cef 10.255.255.1 (EDGE)"
              echo '```json'
              cat /tmp/show_cef_edge.json
              echo
              echo '```'
            fi
            if [ -f /tmp/datapath.json ]; then
              echo "## /api/v3/datapath-test"
              echo '```json'
              cat /tmp/datapath.json
              echo
              echo '```'
            fi
            if [ -f /tmp/rollback.json ]; then
              echo "## /api/v3/rollback (configure replace flash:pre-sda-backup.cfg)"
              echo '```json'
              cat /tmp/rollback.json
              echo
              echo '```'
            fi
            if [ -f /tmp/list_flash.json ]; then
              echo "## /api/v3/list-flash"
              echo '```json'
              cat /tmp/list_flash.json
              echo
              echo '```'
            fi
            if [ -f /tmp/phase5.json ]; then
              echo "## /api/v3/deploy/phase5-internet"
              echo '```json'
              cat /tmp/phase5.json
              echo
              echo '```'
            fi
            if [ -f /tmp/verify4.json ]; then
              echo "## /api/v3/verify/phase4-access"
              echo '```json'
              cat /tmp/verify4.json
              echo
              echo '```'
            fi
            if [ -f /tmp/endpoint_map.json ]; then
              echo "## /api/v3/endpoint-map"
              echo '```json'
              cat /tmp/endpoint_map.json
              echo
              echo '```'
            fi
          } > LATEST_V3_RESULT.md
          git config user.email "actions@github.com"
          git config user.name "sda-runner-v3"
          git add LATEST_V3_RESULT.md
          git commit -m "ci: v3 result for ${{ github.sha }} [skip ci]" || echo "no changes"
          git push origin main || echo "push failed (non-fatal)"
