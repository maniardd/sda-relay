name: SDA Deploy

on:
  push:
    branches: [main]
    paths:
      - 'sda_relay_server_v2.py'
      - 'sda_yang_payloads_v2.json'
      - 'scripts/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      action:
        description: 'doit.sh action (phase1/status/etc)'
        required: false
        default: 'phase1'

jobs:
  deploy:
    runs-on: [self-hosted, sda-relay]
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync repo to /opt/sda-relay and run doit.sh
        id: deploy
        env:
          ACTION: ${{ github.event.inputs.action || 'phase1' }}
        run: |
          set -e
          # Sync this checkout into /opt/sda-relay (which gunicorn runs from)
          rsync -a --delete \
              --exclude='.git' --exclude='.github' --exclude='backups' \
              --exclude='*.log' --exclude='venv' \
              "$GITHUB_WORKSPACE/" /opt/sda-relay/
          chmod +x /opt/sda-relay/scripts/*.sh

          # Run doit.sh, capture full output
          OUTPUT_FILE=$(mktemp)
          /opt/sda-relay/scripts/doit.sh "$ACTION" 2>&1 | tee "$OUTPUT_FILE"

          # Extract Gist URL (last gist.github.com URL printed by diag.sh)
          GIST_URL=$(grep -oE 'https://gist\.github\.com/[a-zA-Z0-9_/]+' "$OUTPUT_FILE" | tail -1 || echo "NO_GIST_URL")
          echo "GIST_URL=$GIST_URL" >> "$GITHUB_OUTPUT"
          echo "ACTION=$ACTION" >> "$GITHUB_OUTPUT"
          echo "$GIST_URL" > /tmp/last_gist_url.txt

      - name: Update LATEST_RESULT.md
        env:
          GIST_URL: ${{ steps.deploy.outputs.GIST_URL }}
          ACTION: ${{ steps.deploy.outputs.ACTION }}
        run: |
          cd "$GITHUB_WORKSPACE"
          cat > LATEST_RESULT.md <<EOF
          # Latest SDA Deploy Result

          - **Action**: \`$ACTION\`
          - **Commit**: \`${{ github.sha }}\`
          - **Time**: $(date -u +%Y-%m-%dT%H:%M:%SZ)
          - **Gist**: $GIST_URL

          (auto-generated by .github/workflows/deploy.yml)
          EOF
          git config user.email "actions@github.com"
          git config user.name "sda-runner"
          git add LATEST_RESULT.md
          git commit -m "ci: result of $ACTION → $GIST_URL [skip ci]" || echo "no changes"
          git push origin main || echo "push failed (non-fatal)"
